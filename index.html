<!DOCTYPE html><html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Tracker</title><style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,Arial;
  background:#0f172a;
  color:#e2e8f0;
}
.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}
h2{text-align:center;margin-bottom:20px}

.card{
  background:#1e293b;
  border-radius:14px;
  padding:14px;
  margin-top:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #334155;
  background:#0f172a;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:600;
  margin-top:6px;
}

button.secondary{background:#3b82f6}
button.danger{background:#ef4444}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.grade{
  display:flex;
  justify-content:space-between;
  background:#0f172a;
  padding:8px;
  border-radius:8px;
  margin-top:6px;
}

/* MODAL */
.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:12px 18px;
  border-radius:10px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1}
</style></head><body><div class="container">
<h2>Grade Tracker</h2><input id="subject" placeholder="Materie">
<button onclick="addSubject()">Adaugă materie</button><select id="subjectSelect"></select> <input id="grade" type="number" placeholder="Notă"> <button onclick="addGrade()">Adaugă notă</button>

<div id="stats"></div>
<div id="list"></div>
</div><!-- MODAL --><div class="modal-bg" id="modalBg">
  <div class="modal">
    <p id="modalText">Confirm?</p>
    <button onclick="confirmAction()">Confirmă</button>
    <button class="secondary" onclick="closeModal()">Anulează</button>
  </div>
</div><div class="toast" id="toast"></div><script>
let data = JSON.parse(localStorage.getItem("data")||"{}");
let action = null;

function save(){localStorage.setItem("data",JSON.stringify(data));}

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

function openModal(text,fn){
  document.getElementById("modalText").innerText=text;
  document.getElementById("modalBg").style.display="flex";
  action=fn;
}

function closeModal(){
  document.getElementById("modalBg").style.display="none";
}

function confirmAction(){
  if(action) action();
  closeModal();
}

function addSubject(){
  const s=document.getElementById("subject").value.trim();
  if(!s) return toast("Completează materie");
  if(data[s]) return toast("Există deja");
  data[s]=[];
  save(); render();
}

function deleteSubject(sub){
  openModal("Ștergi materia?",()=>{
    delete data[sub];
    save(); render();
    toast("Șters");
  });
}

function addGrade(){
  const s=document.getElementById("subjectSelect").value;
  const g=Number(document.getElementById("grade").value);
  if(!s||!g) return toast("Completează");
  data[s].push(g);
  save(); render();
}

function deleteGrade(sub,i){
  openModal("Ștergi nota?",()=>{
    data[sub].splice(i,1);
    save(); render();
    toast("Șters");
  });
}

function avg(arr){return arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2):0}

function render(){
  const sel=document.getElementById("subjectSelect");
  sel.innerHTML="";

  Object.keys(data).forEach(s=>{
    sel.innerHTML+=`<option>${s}</option>`;
  });

  let best=null,worst=null;

  Object.keys(data).forEach(s=>{
    let a=parseFloat(avg(data[s]));
    if(best===null||a>best.avg) best={s,avg:a};
    if(worst===null||a<worst.avg) worst={s,avg:a};
  });

  document.getElementById("stats").innerHTML=
    best?`Best: ${best.s} (${best.avg})<br>Worst: ${worst.s} (${worst.avg})`:"";

  const list=document.getElementById("list");
  list.innerHTML="";

  Object.keys(data).forEach(sub=>{
    list.innerHTML+=`
    <div class="card">
      <div class="row">
        <b>${sub}</b>
        <button class="danger" onclick="deleteSubject('${sub}')">Delete</button>
      </div>
      <div>Average: ${avg(data[sub])}</div>
      ${data[sub].map((g,i)=>`
        <div class="grade">
          ${g}
          <button class="danger" onclick="deleteGrade('${sub}',${i})">X</button>
        </div>
      `).join('')}
    </div>
    `;
  });
}

render();
</script></body>
</html>
