<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tracker Note</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    h2 {
      text-align: center;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    button, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #2a2a2a;
      color: white;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: white;
      font-size: 16px;
    }

    button.add {
      width: 100%;
      background: #4caf50;
      margin-top: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #1e1e1e;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
    }

    .del {
      background: red;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <h2 id="title">📚 Tracker Note</h2>
    <select id="lang" onchange="setLang()">
      <option value="ro">RO</option>
      <option value="en">EN</option>
    </select>
  </div>

  <input id="subject" type="text" placeholder="Materie / Subject" />
  <input id="grade" type="number" placeholder="Notă / Grade" />

  <button class="add" onclick="addGrade()" id="addBtn">Adaugă notă</button>

  <ul id="list"></ul>

</div>

<script>
let lang = localStorage.getItem("lang") || "ro";
document.getElementById("lang").value = lang;

const texts = {
  ro: {
    title: "📚 Tracker Note",
    subject: "Materie (ex: Matematică)",
    grade: "Notă (ex: 9)",
    add: "Adaugă notă",
    empty: "Completează ambele câmpuri"
  },
  en: {
    title: "📚 Grade Tracker",
    subject: "Subject (e.g. Math)",
    grade: "Grade (e.g. 9)",
    add: "Add grade",
    empty: "Fill both fields"
  }
};

function applyLang() {
  document.getElementById("title").innerText = texts[lang].title;
  document.getElementById("subject").placeholder = texts[lang].subject;
  document.getElementById("grade").placeholder = texts[lang].grade;
  document.getElementById("addBtn").innerText = texts[lang].add;
}

function setLang() {
  lang = document.getElementById("lang").value;
  localStorage.setItem("lang", lang);
  applyLang();
}

applyLang();

let grades = JSON.parse(localStorage.getItem("grades") || "[]");

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  grades.forEach((g, i) => {
    list.innerHTML += `
      <li>
        ${g.subject} - ${g.grade}
        <button class="del" onclick="del(${i})">X</button>
      </li>
    `;
  });

  localStorage.setItem("grades", JSON.stringify(grades));
}

function addGrade() {
  const s = document.getElementById("subject").value.trim();
  const g = document.getElementById("grade").value.trim();

  if (!s || !g) {
    alert(texts[lang].empty);
    return;
  }

  grades.push({ subject: s, grade: g });

  document.getElementById("subject").value = "";
  document.getElementById("grade").value = "";

  render();
}

function del(i) {
  grades.splice(i, 1);
  render();
}

render();
</script>

</body>
</html>
