<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Tracker</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,Arial;
  background:#0a0f1a;
  color:#e5e7eb;
}

.container{
  max-width:760px;
  margin:auto;
  padding:12px 12px 90px;
}

h2{text-align:center;margin:10px 0}

/* cards */
.card{
  background:#111827;
  border-radius:14px;
  padding:14px;
  margin-top:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

/* inputs */
.input-row{
  display:flex;
  gap:8px;
  margin-top:8px;
  align-items:stretch;
}

input,select{
  flex:1;
  min-width:0;
  padding:10px;
  border-radius:10px;
  border:1px solid #1f2937;
  background:#0b1220;
  color:#fff;
}

button{
  padding:10px 12px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  flex-shrink:0;
}

.primary{background:#22c55e}
.danger{background:#ef4444}
.blue{background:#3b82f6}

/* grade */
.grade{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  background:#0b1220;
}

/* stats */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.stat{
  background:#0f172a;
  padding:12px;
  border-radius:12px;
}

.big{grid-column:span 2;text-align:center}

.green{background:#052e16}
.red{background:#3f0f0f}

/* toast */
.toast{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 18px;
  border-radius:12px;
  font-weight:600;
  opacity:0;
  transition:.25s;
}
.toast.show{opacity:1}
.toast.success{background:#22c55e;color:#022c22}
.toast.error{background:#ef4444;color:#fff}

/* tabs */
.tabs{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#0b1220;
}
.tabs button{
  flex:1;
  background:none;
  color:#94a3b8;
}
.tabs .active{color:#22c55e}

canvas{width:100%!important;height:220px!important}
</style>
</head>

<body>

<div class="container">

<h2>Grade Tracker</h2>

<div id="home">
<div class="card">
<div class="input-row">
<input id="subject" placeholder="Materie">
<button class="primary" onclick="addSubject()">+</button>
</div>

<div class="input-row">
<select id="subjectSelect"></select>
<input id="grade" type="number" placeholder="Notă">
<button class="primary" onclick="addGrade()">+</button>
</div>
</div>

<div id="list"></div>
</div>

<div id="statsPage" style="display:none">
<div class="card"><canvas id="chart"></canvas></div>
<div id="stats" class="stats-grid"></div>
</div>

<div id="settingsPage" style="display:none">
<div class="card">
<select id="classSelect">
<option value="6">Clasa 6</option>
<option value="7">Clasa 7</option>
<option value="8">Clasa 8</option>
<option value="9">Clasa 9</option>
<option value="10">Clasa 10</option>
<option value="11">Clasa 11</option>
<option value="12">Clasa 12</option>
</select>
<button class="blue" onclick="loadTemplate()">Load template</button>
</div>

<div class="card">
<button class="danger" onclick="resetAll()">Reset</button>
</div>
</div>

</div>

<div id="toast" class="toast"></div>

<div class="tabs">
<button class="active" onclick="tab('home',this)">Subjects</button>
<button onclick="tab('statsPage',this)">Stats</button>
<button onclick="tab('settingsPage',this)">Settings</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

let data = JSON.parse(localStorage.getItem('data')||'{}');
let chart;

const templates = {
6:["Biologia","Educația plastică","Educația tehnologică","Fizica","Geografia","Istoria românilor și universală","Limba engleză","Limba franceză","Limba și literatura română","Matematică","Educația fizică","Educație pentru societate"],
7:["Biologia","Educația plastică","Educația tehnologică","Fizica","Geografia","Istoria românilor și universală","Limba engleză","Limba franceză","Limba și literatura română","Matematică","Educația fizică","Educație pentru societate","Informatica","Chimia"],
8:["Biologia","Educația plastică","Educația tehnologică","Fizica","Geografia","Istoria românilor și universală","Limba engleză","Limba franceză","Limba și literatura română","Matematică","Educația fizică","Educație pentru societate","Informatica","Chimia"],
9:["Biologia","Educația plastică","Educația tehnologică","Fizica","Geografia","Istoria românilor și universală","Limba engleză","Limba franceză","Limba și literatura română","Matematică","Educația fizică","Educație pentru societate","Informatica","Chimia"],
10:["Biologia","Educația plastică","Educația tehnologică","Fizica","Geografia","Istoria românilor și universală","Limba engleză","Limba franceză","Limba și literatura română","Matematică","Educația fizică","Educație pentru societate","Informatica","Chimia"],
11:["Biologia","Educația plastică","Educația tehnologică","Fizica","Geografia","Istoria românilor și universală","Limba engleză","Limba franceză","Limba și literatura română","Matematică","Educația fizică","Educație pentru societate","Informatica","Chimia"],
12:["Biologia","Educația plastică","Educația tehnologică","Fizica","Geografia","Istoria românilor și universală","Limba engleză","Limba franceză","Limba și literatura română","Matematică","Educația fizică","Educație pentru societate","Informatica","Chimia"]
};

function save(){localStorage.setItem('data',JSON.stringify(data));}

function toast(msg,type="success"){
let t=document.getElementById('toast');
t.innerText=msg;
t.className="toast show "+type;
setTimeout(()=>t.classList.remove("show"),1500);
}

function addSubject(){
let s=subject.value.trim();
if(!s) return toast("Completează","error");
if(data[s]) return toast("Există deja","error");
data[s]=[];
subject.value='';
save();render();
toast("Adăugat","success");
}

function addGrade(){
let s=subjectSelect.value;
let g=+grade.value;
if(!s||!g) return toast("Completează","error");
data[s].push(g);
grade.value='';
save();render();
toast("Notă adăugată","success");
}

function deleteSubject(s){
delete data[s];
save();render();
toast("Șters","success");
}

function deleteGrade(s,i){
data[s].splice(i,1);
save();render();
toast("Șters","success");
}

function loadTemplate(){
let c=classSelect.value;
templates[c].forEach(s=>{if(!data[s])data[s]=[]});
save();render();
toast("Template încărcat","success");
}

function resetAll(){
data={};
save();render();
toast("Reset","success");
}

function avg(a){return a.length?(a.reduce((x,y)=>x+y)/a.length):0}

function render(){
subjectSelect.innerHTML='';
Object.keys(data).forEach(s=>{
subjectSelect.innerHTML+=`<option>${s}</option>`;
});

list.innerHTML='';
Object.keys(data).forEach(s=>{
list.innerHTML+=`
<div class="card">
<b>${s}</b>
${data[s].map((g,i)=>`
<div class="grade">
${g}
<button class="danger" onclick="deleteGrade('${s}',${i})">X</button>
</div>`).join('')}
<button class="danger" onclick="deleteSubject('${s}')">Delete</button>
</div>`;
});

renderStats();
renderChart();
}

function renderStats(){
let best=null,worst=null,total=0,count=0;

Object.keys(data).forEach(s=>{
let grades=data[s];
if(!grades.length) return;

let a=avg(grades);
total+=grades.reduce((x,y)=>x+y);
count+=grades.length;

if(!best||a>best.avg) best={name:s,avg:a};
if(!worst||a<worst.avg) worst={name:s,avg:a};
});

let overall=count?(total/count).toFixed(2):"-";

stats.innerHTML=`
<div class="stat big">
<div>Average</div>
<b>${overall}</b>
</div>

<div class="stat green">
<div>Best</div>
<b>${best?best.name:"-"}</b>
</div>

<div class="stat red">
<div>Worst</div>
<b>${worst?worst.name:"-"}</b>
</div>

<div class="stat">
<div>Total grades</div>
<b>${count}</b>
</div>
`;
}

function renderChart(){
let labels=Object.keys(data);
let values=labels.map(s=>avg(data[s]));

if(chart) chart.destroy();

chart=new Chart(document.getElementById('chart'),{
type:'bar',
data:{labels,datasets:[{data:values}]},
options:{plugins:{legend:{display:false}}}
});
}

function tab(id,btn){
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

home.style.display='none';
statsPage.style.display='none';
settingsPage.style.display='none';

document.getElementById(id).style.display='block';
}

render();

</script>

</body>
</html>
