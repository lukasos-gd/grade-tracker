<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grade Tracker Pro</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    h2 { text-align: center; }

    input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #4caf50;
      color: white;
      font-size: 16px;
      margin-top: 10px;
    }

    .card {
      background: #1e1e1e;
      padding: 12px;
      margin-top: 15px;
      border-radius: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
    }

    .del {
      background: red;
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 8px;
    }

    .stats {
      margin-top: 15px;
      background: #222;
      padding: 10px;
      border-radius: 10px;
    }

    .small {
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📚 Grade Tracker PRO</h2>

  <input id="subject" placeholder="Materie (ex: Matematică)" />
  <input id="grade" type="number" placeholder="Notă (ex: 9)" />

  <button onclick="add()">Adaugă notă</button>
  <button onclick="downloadData()" style="background:#2196f3">Export backup</button>

  <div class="stats" id="stats"></div>

  <div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("grades") || "[]");

function save() {
  localStorage.setItem("grades", JSON.stringify(data));
}

function add() {
  const s = document.getElementById("subject").value.trim();
  const g = Number(document.getElementById("grade").value);

  if (!s || !g) return alert("Completează câmpurile");

  data.push({ subject: s, grade: g });

  document.getElementById("subject").value = "";
  document.getElementById("grade").value = "";

  save();
  render();
}

function del(i) {
  data.splice(i, 1);
  save();
  render();
}

function avg(subject) {
  const arr = data.filter(x => x.subject === subject);
  if (!arr.length) return 0;
  return (arr.reduce((a,b)=>a+b.grade,0) / arr.length).toFixed(2);
}

function render() {
  const list = document.getElementById("list");
  const stats = document.getElementById("stats");

  list.innerHTML = "";

  let subjects = [...new Set(data.map(x => x.subject))];

  subjects.forEach(sub => {
    let items = data.filter(x => x.subject === sub);

    list.innerHTML += `
      <div class="card">
        <div class="row">
          <b>${sub}</b>
          <span>Media: ${avg(sub)}</span>
        </div>
        <div class="small">Note: ${items.map(i => i.grade).join(", ")}</div>
      </div>
    `;
  });

  stats.innerHTML = `
    <b>Total note:</b> ${data.length}<br>
    <b>Media generală:</b> ${
      data.length ? (data.reduce((a,b)=>a+b.grade,0)/data.length).toFixed(2) : 0
    }
  `;
}

function downloadData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "grades-backup.json";
  a.click();
}

render();
</script>

</body>
</html>
